name: CI Pipeline

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:

  # ─────────────────────────────
  # FRONTEND CHECKS
  # ─────────────────────────────
  frontend:
    name: Frontend (Vite + React)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build check
        run: npm run build

  # ─────────────────────────────
  # BACKEND CHECKS
  # ─────────────────────────────
  backend:
    name: Backend (Node + Express)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

  # ─────────────────────────────
  # SECURITY CHECKS
  # ─────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Audit frontend dependencies
        working-directory: ./client
        run: npm audit --audit-level=high

      - name: Audit backend dependencies
        working-directory: ./server
        run: npm audit --audit-level=high